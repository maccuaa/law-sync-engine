name: Seed Statutes

on:
  workflow_dispatch:
    inputs:
      all:
        description: "Seed all ~900 acts from Justice Laws index"
        required: false
        type: boolean
        default: false
      limit:
        description: "Maximum number of statutes to seed (use with all)"
        required: false
        type: number
      act:
        description: "Seed a single act by Justice Laws ID (e.g. C-46)"
        required: false
        type: string

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout law-sync-engine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Clone canadian-laws
        run: |
          git clone https://x-access-token:${{ secrets.LAWS_SYNC_TOKEN }}@github.com/maccuaa/canadian-laws.git ../canadian-laws
          cd ../canadian-laws
          git config user.name "Parliament of Canada"
          git config user.email "info@parl.gc.ca"

      - name: Seed consolidated statutes
        env:
          GITHUB_TOKEN: ${{ secrets.LAWS_SYNC_TOKEN }}
          GITHUB_OWNER: maccuaa
          LAWS_REPO: canadian-laws
          LAWS_REPO_PATH: ../canadian-laws
        run: |
          ARGS=""
          if [ "${{ inputs.all }}" = "true" ]; then ARGS="$ARGS --all"; fi
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ -n "${{ inputs.act }}" ]; then ARGS="$ARGS --act ${{ inputs.act }}"; fi
          bun run src/index.ts seed $ARGS
