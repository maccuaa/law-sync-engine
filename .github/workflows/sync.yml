name: Daily Sync

on:
  schedule:
    - cron: '0 12 * * *' # Noon UTC daily
  workflow_dispatch: # Manual trigger
    inputs:
      limit:
        description: 'Max bills to process (empty = all)'
        required: false
        type: string
      bill:
        description: 'Sync a single bill (e.g. C-2)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (no changes)'
        required: false
        type: boolean
        default: false

jobs:
  sync-bills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout law-sync-engine
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Clone canadian-laws
        run: |
          git clone https://x-access-token:${{ secrets.LAWS_SYNC_TOKEN }}@github.com/maccuaa/canadian-laws.git ../canadian-laws
          cd ../canadian-laws
          git config user.name "law-sync-engine[bot]"
          git config user.email "law-sync-engine[bot]@users.noreply.github.com"

      - name: Sync new bills
        env:
          GITHUB_TOKEN: ${{ secrets.LAWS_SYNC_TOKEN }}
          GITHUB_OWNER: maccuaa
          LAWS_REPO: canadian-laws
          LAWS_REPO_PATH: ../canadian-laws
        run: |
          ARGS=""
          if [ -n "${{ inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ inputs.limit }}"; fi
          if [ -n "${{ inputs.bill }}" ]; then ARGS="$ARGS --bill ${{ inputs.bill }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          bun run src/index.ts sync $ARGS

      - name: Update project board
        env:
          GITHUB_TOKEN: ${{ secrets.LAWS_SYNC_TOKEN }}
          GITHUB_OWNER: maccuaa
          LAWS_REPO: canadian-laws
          LAWS_REPO_PATH: ../canadian-laws
          PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER || '1' }}
        run: bun run src/index.ts update-board
